version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-dashboard-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=devops_dashboard
      - DB_USER=dashboard_user
      - DB_PASSWORD=dashboard_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: devops-dashboard-db
    environment:
      - POSTGRES_DB=devops_dashboard
      - POSTGRES_USER=dashboard_user
      - POSTGRES_PASSWORD=dashboard_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d devops_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  devops-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
