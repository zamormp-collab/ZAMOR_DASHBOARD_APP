# ============================================
# BEGINNER LEVEL - GitHub Actions CI Workflow
# ============================================
# 
# Learning objectives:
# ✓ What is a workflow?
# ✓ Basic triggers (push events)
# ✓ Running simple commands
# ✓ Understanding job steps
#
# Key concepts:
# - Single job
# - No dependencies between jobs
# - No advanced features
# - Basic checkout and setup

name: Basic CI

# Trigger on every push to any branch
on:
  push:
    branches: [ '**' ]

jobs:
  # Simple test job - runs on every push
  test:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Get the code from repository
    - name: Checkout code
      uses: actions/checkout@v6
    
    # Step 2: Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 18.x
    
    # Step 3: Install dependencies
    - name: Install dependencies
      run: npm ci
    
    # Step 4: Run tests
    - name: Run tests
      run: npm test
